  <style>

        { name: "Apple Watch Series 7 45mm", year: 2021, price: 180, note: "Used current value" },

    const wishlistItems = [
      { name: "Standing Desk", price: 300, where: "Amazon", priority: "Medium" },
      { name: 'Arzopa 15" Portable Monitor', price: 200, where: "Amazon", priority: "Medium" },
      { name: "Govee Smart LED Strip", price: 50, where: "Govee", priority: "Low" },
      { name: "Apple TV 4K", price: 150, where: "Apple", priority: "Low" },

      { name: "Android 4K Projector", price: 300, where: "Amazon", priority: "Low" },

      { name: "Meta Quest 3", price: 499, where: "Meta", priority: "Medium" },
      { name: "DJI Air 3S", price: 999, where: "DJI", priority: "Medium" },
    ];

    ];

    const toolsIUse = [

      { tool: "Gemini", whatFor: "Everything", cost: "Free till next year" },
      { tool: "Wispr Flow", whatFor: "Voice typing", cost: "Free (2 weeks trial)" },
    ];

    const wikiSections = [
      {
        id: "arsenal", icon: "🖥️", title: "Tech Arsenal", color: "#00FF94",
        desc: "Everything you own, reviewed by you",
        subsections: [
          { title: "Daily Drivers", placeholder: "Devices you use every single day" },
          { title: "Desk Setup Log", placeholder: "Date → Change → Why → Verdict" },
          { title: "Honest Reviews", placeholder: "Your raw take. No sponsorships, no BS" },
        ],
      },
      {
        id: "hacks", icon: "⚡", title: "Hacks & Discoveries", color: "#FFD700",
        desc: "Every tip, trick and shortcut you find",
        subsections: [
          { title: "Software Hacks", placeholder: "Windows/Mac tips, shortcuts, app tricks" },
          { title: "Setup Optimisations", placeholder: "Cable management, lighting, ergonomics" },
          { title: "Productivity Flows", placeholder: "Workflows and automation that save time" },
          { title: "Random Gold", placeholder: "Anything cool that doesn't fit elsewhere" },
        ],
      },
      {
        id: "builds", icon: "🔧", title: "Build Logs", color: "#FF6B6B",
        desc: "Document every build start to finish",
        subsections: [
          { title: "Current Build", placeholder: "What you're working on right now" },
          { title: "Parts & Prices", placeholder: "What you bought, where, how much" },
          { title: "Mistakes Made", placeholder: "So you don't repeat them. Own it." },
        ],
      },
      {
        id: "photo", icon: "📸", title: "Photography Lab", color: "#F472B6",
        desc: "Settings, edits, shots worth keeping",
        subsections: [
          { title: "Shot Settings", placeholder: "Settings that worked for specific scenes" },
          { title: "Editing Notes", placeholder: "Lightroom presets, colour grades, techniques" },
          { title: "Food Photography", placeholder: "Angles, lighting, styling tricks" },
        ],
      },
      {
        id: "kitchen", icon: "🍳", title: "Kitchen Lab", color: "#FB923C",
        desc: "Experiments, recipes, wins and fails",
        subsections: [
          { title: "Recipe Experiments", placeholder: "What you tried, what you tweaked, result" },
          { title: "Techniques Learned", placeholder: "Skills that changed the game" },
          { title: "Fails Hall of Fame", placeholder: "The disasters. Own them." },
        ],
      },

        id: "brain", icon: "🧠", title: "Brain Dump", color: "#34D399",
        desc: "Thoughts, ideas, stuff you don't want to forget",
        subsections: [
          { title: "Ideas Inbox", placeholder: "Dump anything here, sort it later" },
          { title: "Things To Learn", placeholder: "Skills and tools on the radar" },
          { title: "Monthly Reflection", placeholder: "What did you learn? What changed?" },
        ],

    ];

    const ownedTotal = gear.flatMap(g => g.items).reduce((s, i) => s + i.price, 0);
    const wishlistTotal = wishlistItems.reduce((s, i) => s + i.price, 0);

    // ─── TAB: ARSENAL ────────────────────────────────────────────────
    function ArsenalTab() {
      const [expanded, setExpanded] = useState(null);
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 28 }}>
            {[
              { label: "Arsenal Value", val: `~£${ownedTotal.toLocaleString()}`, color: "#00FF94" },
              { label: "Wishlist Total", val: `~£${wishlistTotal.toLocaleString()}`, color: "#FFD700" },
              { label: "If You Buy All", val: `~£${(ownedTotal + wishlistTotal).toLocaleString()}`, color: "#FF6B6B" },
              { label: "Total Devices", val: gear.flatMap(g => g.items).length, color: "#A78BFA" },
            ].map(({ label, val, color }) => (
              <div key={label} style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, padding: "16px 18px" }}>
                <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color, fontFamily: "'Space Grotesk', sans-serif" }}>{val}</div>
              </div>
            ))}
          </div>
          {gear.map((cat) => {
            const catTotal = cat.items.reduce((s, i) => s + i.price, 0);
            const isOpen = expanded === cat.category;
            return (
              <div key={cat.category} style={{ marginBottom: 8, background: "#111", border: `1px solid ${isOpen ? cat.color + "44" : "#1E1E1E"}`, borderRadius: 10, overflow: "hidden", transition: "border-color 0.2s" }}>
                <div onClick={() => setExpanded(isOpen ? null : cat.category)}
                  style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 18px", cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 13, fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600 }}>{cat.category}</span>
                    <span style={{ fontSize: 10, color: "#444" }}>{cat.items.length} items</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ color: cat.color, fontWeight: 700, fontSize: 14 }}>£{catTotal.toLocaleString()}</span>
                    <span style={{ color: "#444", fontSize: 11 }}>{isOpen ? "▲" : "▼"}</span>
                  </div>
                </div>
                {isOpen && (
                  <div style={{ borderTop: "1px solid #1A1A1A" }}>
                    {cat.items.map((item, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 18px", borderBottom: i < cat.items.length - 1 ? "1px solid #161616" : "none", background: "#0D0D0D" }}>
                        <div>
                          <div style={{ fontSize: 13, color: "#CCC" }}>{item.name}</div>
                          <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>{item.year}{item.note ? ` · ${item.note}` : ""}</div>
                        </div>
                        <div style={{ fontSize: 13, color: "#666", fontWeight: 600 }}>£{item.price.toLocaleString()}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
          <div style={{ marginTop: 14, fontSize: 10, color: "#2A2A2A", textAlign: "center" }}>* Approximate UK market values · March 2026</div>
        </div>
      );
    }

    // ─── TAB: WISHLIST ───────────────────────────────────────────────
    function WishlistTab() {
      const priorityColor = { High: "#00FF94", Medium: "#FFD700", Low: "#555" };
      return (
        <div>
          <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
            <div style={{ background: "#FFD70012", border: "1px solid #FFD70033", borderRadius: 8, padding: "10px 18px" }}>
              <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Wishlist Total</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#FFD700", fontFamily: "'Space Grotesk', sans-serif" }}>~£{wishlistTotal.toLocaleString()}</div>
            </div>
            <div style={{ background: "#FF6B6B12", border: "1px solid #FF6B6B33", borderRadius: 8, padding: "10px 18px" }}>
              <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Combined with Arsenal</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#FF6B6B", fontFamily: "'Space Grotesk', sans-serif" }}>~£{(ownedTotal + wishlistTotal).toLocaleString()}</div>
            </div>
          </div>
          <div style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: 16, padding: "10px 18px", borderBottom: "1px solid #1A1A1A" }}>
              {["Item", "Where", "Price", "Priority"].map(h => (
                <div key={h} style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 2 }}>{h}</div>
              ))}
            </div>
            {wishlistItems.map((item, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: 16, padding: "12px 18px", alignItems: "center", borderBottom: i < wishlistItems.length - 1 ? "1px solid #161616" : "none", background: i % 2 === 0 ? "#0D0D0D" : "#111" }}>
                <div style={{ fontSize: 13, color: "#CCC" }}>{item.name}</div>
                <div style={{ fontSize: 11, color: "#555" }}>{item.where}</div>
                <div style={{ fontSize: 13, color: "#888", fontWeight: 600 }}>£{item.price.toLocaleString()}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: priorityColor[item.priority] || "#555", background: `${priorityColor[item.priority]}18`, border: `1px solid ${priorityColor[item.priority]}33`, padding: "2px 8px", borderRadius: 20, textAlign: "center" }}>{item.priority}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── TAB: WIKI ───────────────────────────────────────────────────
    function WikiTab() {
      const [activeSection, setActiveSection] = useState("arsenal");
      const current = wikiSections.find(s => s.id === activeSection);
      return (
        <div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
            {wikiSections.map(s => (
              <button key={s.id} onClick={() => setActiveSection(s.id)} style={{ background: activeSection === s.id ? s.color : "#141414", border: `1px solid ${activeSection === s.id ? s.color : "#2A2A2A"}`, color: activeSection === s.id ? "#0A0A0A" : "#666", padding: "6px 14px", borderRadius: 20, cursor: "pointer", fontSize: 11, fontFamily: "inherit", fontWeight: activeSection === s.id ? 700 : 400, whiteSpace: "nowrap", transition: "all 0.15s", letterSpacing: 0.5 }}>
                {s.icon} {s.title}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <div style={{ width: 44, height: 44, background: `${current.color}18`, border: `1px solid ${current.color}44`, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{current.icon}</div>
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, color: current.color, fontFamily: "'Space Grotesk', sans-serif" }}>{current.title}</div>
              <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{current.desc}</div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: 12 }}>
            {current.subsections.map((sub, i) => (
              <div key={i} style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, padding: "18px 20px", position: "relative", overflow: "hidden", transition: "border-color 0.2s", cursor: "default" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = `${current.color}55`}
                onMouseLeave={e => e.currentTarget.style.borderColor = "#1E1E1E"}>
                <div style={{ position: "absolute", top: 0, left: 0, width: "100%", height: 2, background: `linear-gradient(90deg, ${current.color}, transparent)`, opacity: 0.5 }} />
                <div style={{ fontSize: 10, color: current.color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8, fontWeight: 600 }}>{String(i + 1).padStart(2, "0")}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#DDD", fontFamily: "'Space Grotesk', sans-serif", marginBottom: 8 }}>{sub.title}</div>
                <div style={{ fontSize: 11, color: "#3A3A3A", lineHeight: 1.6, fontStyle: "italic" }}>{sub.placeholder}</div>
              </div>
            ))}
          </div>

          {activeSection === "hacks" && (
            <div style={{ marginTop: 20 }}>
              <div style={{ fontSize: 10, color: "#FFD700", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12, fontWeight: 700 }}>⚡ Setup Optimisations</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {setupOptimisations.map((tip, i) => (
                  <div key={i} style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 8, padding: "12px 16px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <div style={{ color: "#FFD700", fontSize: 12, marginTop: 1, flexShrink: 0 }}>→</div>
                    <div style={{ fontSize: 13, color: "#CCC", lineHeight: 1.6 }}>{tip}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 10, color: "#FFD700", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12, fontWeight: 700, marginTop: 24 }}>🛠️ Tools I Actually Use</div>
              <div style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, overflow: "hidden" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", padding: "9px 16px", borderBottom: "1px solid #1A1A1A" }}>
                  {["Tool", "What For", "Cost"].map(h => (
                    <div key={h} style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: 2 }}>{h}</div>
                  ))}
                </div>
                {toolsIUse.map((t, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", padding: "11px 16px", alignItems: "center", borderBottom: i < toolsIUse.length - 1 ? "1px solid #161616" : "none", background: i % 2 === 0 ? "#0D0D0D" : "#111" }}>
                    <div style={{ fontSize: 13, color: "#DDD", fontWeight: 600 }}>{t.tool}</div>
                    <div style={{ fontSize: 12, color: "#666" }}>{t.whatFor}</div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#00FF94", background: "#00FF9412", border: "1px solid #00FF9433", padding: "2px 8px", borderRadius: 20, whiteSpace: "nowrap" }}>{t.cost}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── TAB: BUILD LOG ──────────────────────────────────────────────
    function BuildLogTab() {
      const builds = [
        { name: "Main Desk Setup 2025", status: "✅ Complete", cost: "~£3,200", highlight: "QD-OLED + MX Master 3 + Edifier MR4" },
        { name: "Audio Station", status: "✅ Complete", cost: "~£780", highlight: "XM4 + XM3 + Moondrop + JBL" },
        { name: "Photography Kit", status: "🔄 Upgrading", cost: "~£800", highlight: "Canon 80D + 3 lenses" },
        { name: "Gaming Corner", status: "✅ Complete", cost: "~£820", highlight: "PS5 + G29 + DualSense x2" },
      ];
      return (
        <div>
          <div style={{ fontSize: 11, color: "#555", marginBottom: 20, letterSpacing: 1 }}>Document every setup change. Future you will thank you.</div>
          <div style={{ display: "grid", gap: 10 }}>
            {builds.map((b, i) => (
              <div key={i} style={{ background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "#DDD", fontFamily: "'Space Grotesk', sans-serif" }}>{b.name}</div>
                  <div style={{ fontSize: 11, color: "#555", marginTop: 4 }}>{b.highlight}</div>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <div style={{ fontSize: 12, color: "#00FF94", fontWeight: 700 }}>{b.cost}</div>
                  <div style={{ fontSize: 10, padding: "3px 10px", borderRadius: 20, background: b.status.includes("✅") ? "#00FF9418" : "#FFD70018", border: `1px solid ${b.status.includes("✅") ? "#00FF9433" : "#FFD70033"}`, color: b.status.includes("✅") ? "#00FF94" : "#FFD700" }}>{b.status}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 20, background: "#111", border: "1px solid #1E1E1E", borderRadius: 10, padding: "18px 20px" }}>
            <div style={{ fontSize: 10, color: "#FFD700", letterSpacing: 3, textTransform: "uppercase", marginBottom: 14, fontWeight: 700 }}>🔜 Next Build — Standing Desk Upgrade</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
              {[
                { item: "Standing Desk", status: "🛒 To Buy", price: "£300" },
                { item: "Govee LED Strip", status: "🛒 To Buy", price: "£50" },
                { item: "Monitor Arm", status: "🤔 Considering", price: "~£50" },
                { item: "Cable Management", status: "🤔 Considering", price: "~£30" },
              ].map((r, i) => (
                <div key={i} style={{ background: "#0D0D0D", border: "1px solid #1A1A1A", borderRadius: 8, padding: "12px 14px" }}>
                  <div style={{ fontSize: 12, color: "#CCC", marginBottom: 6 }}>{r.item}</div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontSize: 10, color: "#555" }}>{r.status}</div>
                    <div style={{ fontSize: 12, color: "#FFD700", fontWeight: 600 }}>{r.price}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────
    const TABS = [
      { id: "arsenal", label: "🖥️ Arsenal" },
      { id: "wishlist", label: "🛒 Wishlist" },
      { id: "wiki", label: "📓 Wiki" },
      { id: "builds", label: "🔧 Build Log" },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState("arsenal");
      return (
        <div style={{ minHeight: "100vh", background: "#0A0A0A", fontFamily: "'DM Mono', 'Courier New', monospace", color: "#E0E0E0" }}>
          {/* Header */}
          <div style={{ borderBottom: "1px solid #1A1A1A", padding: "24px 32px 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontSize: 10, letterSpacing: 4, color: "#333", marginBottom: 4, textTransform: "uppercase" }}>Aryan's Personal Wiki</div>
                <h1 style={{ margin: 0, fontSize: "clamp(20px, 4vw, 32px)", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 800, background: "linear-gradient(90deg, #00FF94, #FFD700)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: -1 }}>🚀 Tech HQ</h1>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#444", marginBottom: 4, letterSpacing: 1 }}>TOTAL ARSENAL</div>
                <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", fontFamily: "'Space Grotesk', sans-serif" }}>~£{ownedTotal.toLocaleString()}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 0, overflowX: "auto", scrollbarWidth: "none" }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ background: "transparent", border: "none", borderBottom: activeTab === t.id ? "2px solid #00FF94" : "2px solid transparent", color: activeTab === t.id ? "#00FF94" : "#555", padding: "10px 20px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: activeTab === t.id ? 700 : 400, letterSpacing: 1, textTransform: "uppercase", whiteSpace: "nowrap", transition: "all 0.15s" }}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Body */}
          <div style={{ padding: "28px 32px", maxWidth: 960, margin: "0 auto" }}>
            {activeTab === "arsenal" && <ArsenalTab />}
            {activeTab === "wishlist" && <WishlistTab />}
            {activeTab === "wiki" && <WikiTab />}
            {activeTab === "builds" && <BuildLogTab />}
          </div>

          <div style={{ textAlign: "center", padding: "16px", color: "#222", fontSize: 10, letterSpacing: 3 }}>
            TECH HQ · ARYAN · NO ALGORITHM · GEEKESTER
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
