  }

    return <div style={{ background: "#16181F", border: "1px solid #1F2028", borderRadius: 12, ...style }}>{children}</div>;
  }

  function SectionLabel({ children }) {
    return <div style={{ fontSize: 11, fontWeight: 600, color: "#52525B", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10 }}>{children}</div>;
  }

  function ArsenalTab() {
    const [expanded, setExpanded] = useState(null);
    return (
      <div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 8, marginBottom: 24 }}>
          {[
            { label: "Arsenal Value", val: `~£${ownedTotal.toLocaleString()}`, color: "#6366F1" },
            { label: "Wishlist", val: `~£${wishlistTotal.toLocaleString()}`, color: "#FBBF24" },
            { label: "All-In", val: `~£${(ownedTotal + wishlistTotal).toLocaleString()}`, color: "#F472B6" },
            { label: "Devices", val: gear.flatMap(g => g.items).length, color: "#34D399" },
          ].map(({ label, val, color }) => (
            <Card key={label} style={{ padding: "14px 16px" }}>

            </Card>
          ))}
        </div>
        <SectionLabel>Your Gear</SectionLabel>

          const catTotal = cat.items.reduce((s, i) => s + i.price, 0);
          const isOpen = expanded === cat.category;
          return (
            <div key={cat.category} style={{ marginBottom: 6 }}>
              <div onClick={() => setExpanded(isOpen ? null : cat.category)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", cursor: "pointer", userSelect: "none", background: isOpen ? "#1A1C24" : "#16181F", border: `1px solid ${isOpen ? cat.color + "35" : "#1F2028"}`, borderRadius: isOpen ? "10px 10px 0 0" : 10, transition: "all 0.15s" }}>

                  <div style={{ width: 28, height: 28, background: cat.color + "15", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>{cat.icon}</div>

                  <span style={{ fontSize: 11, color: "#3F3F46" }}>{cat.items.length}</span>

                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: cat.color }}>£{catTotal.toLocaleString()}</span>
                  <span style={{ color: "#3F3F46", fontSize: 10 }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>
              {isOpen && (
                <div style={{ background: "#13151C", border: `1px solid ${cat.color}20`, borderTop: "none", borderRadius: "0 0 10px 10px" }}>
                  {cat.items.map((item, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px 10px 52px", borderBottom: i < cat.items.length - 1 ? "1px solid #1A1C24" : "none" }}>

                      <span style={{ fontSize: 13, color: "#52525B", fontWeight: 500 }}>£{item.price.toLocaleString()}</span>

  function WishlistTab() {
    const ps = { High: { c: "#34D399", b: "#34D39915", br: "#34D39930" }, Medium: { c: "#FBBF24", b: "#FBBF2415", br: "#FBBF2430" }, Low: { c: "#52525B", b: "#52525B15", br: "#52525B30" } };

    return (
      <div>
        <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>

            <SectionLabel>{group.label}</SectionLabel>
            <Card>
              {group.items.map((item, i) => {

                return (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderBottom: i < group.items.length - 1 ? "1px solid #1A1C24" : "none" }}>

                      <span style={{ fontSize: 10, fontWeight: 600, color: p.c, background: p.b, border: `1px solid ${p.br}`, padding: "2px 8px", borderRadius: 99 }}>{item.priority}</span>
                    </div>

              })}
            </Card>
          </div>
        ))}
      </div>
    );

                </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", padding: "9px 16px", borderBottom: "1px solid #1A1C24" }}>
                {["Tool", "What For", "Cost"].map(h => <div key={h} style={{ fontSize: 10, color: "#3F3F46", fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>{h}</div>)}

              {toolsIUse.map((t, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", padding: "11px 16px", alignItems: "center", borderBottom: i < toolsIUse.length - 1 ? "1px solid #1A1C24" : "none" }}>
                  <div style={{ fontSize: 13, color: "#D4D4D8", fontWeight: 600 }}>{t.tool}</div>
                  <div style={{ fontSize: 12, color: "#71717A" }}>{t.whatFor}</div>
                  <Badge color="#34D399">{t.cost}</Badge>
                </div>
              ))}
            </Card>
          </div>
        )}
      </div>
    );

      <div>
        <SectionLabel>Completed Builds</SectionLabel>
        <div style={{ display: "grid", gap: 8, marginBottom: 24 }}>

                <div style={{ fontSize: 12, color: "#52525B" }}>{b.highlight}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#6366F1" }}>{b.cost}</span>

              </div>

        </div>
        <SectionLabel>Next Build — Standing Desk Upgrade</SectionLabel>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 8 }}>
          {nextBuild.map((r, i) => (
            <Card key={i} style={{ padding: "13px 14px" }}>
              <div style={{ fontSize: 13, color: "#A1A1AA", fontWeight: 500, marginBottom: 8 }}>{r.item}</div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 10, fontWeight: 600, color: ss[r.status].c, background: ss[r.status].b, border: `1px solid ${ss[r.status].br}`, padding: "2px 7px", borderRadius: 99 }}>{r.status}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#FBBF24" }}>{r.price}</span>
              </div>
            </Card>
          ))}
        </div>
      </div>
    );

      <div>

              {cat}

        </div>

        {/* Empty state */}
        {filtered.length === 0 && (
          <Card style={{ padding: "48px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 36, marginBottom: 16 }}>⚡</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#D4D4D8", marginBottom: 8 }}>No shortcuts here yet</div>
            <div style={{ fontSize: 13, color: "#52525B", lineHeight: 1.7, maxWidth: 400, margin: "0 auto", marginBottom: 20 }}>
              Add your Apple Shortcuts automations to the <code style={{ background: "#1A1C24", padding: "1px 6px", borderRadius: 4, color: "#6366F1", fontSize: 12 }}>appleShortcuts</code> array in the HTML file.
            </div>
            <div style={{ background: "#13151C", border: "1px solid #1F2028", borderRadius: 10, padding: "14px 18px", textAlign: "left", maxWidth: 500, margin: "0 auto" }}>
              <div style={{ fontSize: 11, color: "#3F3F46", marginBottom: 8, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>Example</div>
              <code style={{ fontSize: 12, color: "#A78BFA", lineHeight: 1.8, display: "block" }}>
                {`{ name: "Morning Routine",`}<br/>
                {`  desc: "DND on, plays playlist, opens News",`}<br/>
                {`  device: "iPhone",`}<br/>
                {`  trigger: "Automation",`}<br/>
                {`  category: "Daily" },`}
              </code>
            </div>
          </Card>
        )}

        {/* Shortcuts grid */}
        {filtered.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 10 }}>
            {filtered.map((s, i) => (
              <Card key={i} style={{ padding: "16px 18px", borderTop: `2px solid ${deviceColor[s.device] || "#6366F1"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#D4D4D8", flex: 1, paddingRight: 8 }}>{s.name}</div>
                  <span style={{ fontSize: 10, fontWeight: 600, color: deviceColor[s.device] || "#6366F1", background: (deviceColor[s.device] || "#6366F1") + "18", border: `1px solid ${(deviceColor[s.device] || "#6366F1")}30`, padding: "2px 7px", borderRadius: 99, whiteSpace: "nowrap" }}>{s.device}</span>
                </div>
                <div style={{ fontSize: 12, color: "#71717A", lineHeight: 1.6, marginBottom: 12 }}>{s.desc}</div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 10, fontWeight: 600, color: triggerColor[s.trigger] || "#94A3B8", background: (triggerColor[s.trigger] || "#94A3B8") + "18", border: `1px solid ${(triggerColor[s.trigger] || "#94A3B8")}30`, padding: "2px 8px", borderRadius: 99 }}>
                    ⚡ {s.trigger}
                  </span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 10, color: "#3F3F46" }}>{(s.categories || [s.category]).join(" · ")}</span>
                    {s.link && <a href={s.link} target="_blank" rel="noopener noreferrer" style={{ fontSize: 10, fontWeight: 600, color: "#6366F1", background: "#6366F118", border: "1px solid #6366F130", padding: "2px 8px", borderRadius: 99, textDecoration: "none" }}>↓ Get</a>}
                  </div>
                </div>
              </Card>
            ))}
          </div>
        )}
      </div>
    );
  }

  const TABS = [
    { id: "arsenal", label: "Arsenal", icon: "🖥" },
    { id: "wishlist", label: "Wishlist", icon: "🛒" },
    { id: "wiki", label: "Wiki", icon: "📓" },
    { id: "builds", label: "Build Log", icon: "🔧" },
    { id: "shortcuts", label: "⚡ Automations", icon: "🍎" },
  ];

  const PAGE_META = {
    arsenal: { title: "Tech Arsenal", desc: "Everything you own, reviewed by you" },
    wishlist: { title: "Wishlist", desc: "Things worth spending money on (maybe)" },
    wiki: { title: "Wiki", desc: "Your findings, hacks and discoveries" },
    builds: { title: "Build Log", desc: "Every setup change documented" },
    shortcuts: { title: "🍎 Apple Shortcuts", desc: "Your personal automations library — run smarter, not harder" },
  };

  function App() {
    const [activeTab, setActiveTab] = useState("arsenal");
    const meta = PAGE_META[activeTab];

    return (
      <div style={{ minHeight: "100vh", display: "flex", background: "#111318" }}>
        {/* Sidebar */}
        <div className="sidebar" style={{ width: 220, flexShrink: 0, background: "#0E1015", borderRight: "1px solid #1A1C24", padding: "28px 0", display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
          <div style={{ padding: "0 20px 28px" }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#3F3F46", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6 }}>Personal Wiki</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#F4F4F5", letterSpacing: -0.5 }}>🚀 Tech HQ</div>
            <div style={{ fontSize: 11, color: "#3F3F46", marginTop: 3 }}>Aryan's Digital Brain</div>
          </div>
          <div style={{ flex: 1, paddingBottom: 16 }}>
            <div style={{ padding: "0 16px 8px", fontSize: 10, fontWeight: 600, color: "#3F3F46", letterSpacing: 1.5, textTransform: "uppercase" }}>Menu</div>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ width: "100%", textAlign: "left", background: activeTab === t.id ? "#16181F" : "transparent", border: "none", borderLeft: activeTab === t.id ? "2px solid #6366F1" : "2px solid transparent", color: activeTab === t.id ? "#F4F4F5" : "#71717A", padding: "9px 14px", cursor: "pointer", fontSize: 13, fontWeight: activeTab === t.id ? 600 : 400, transition: "all 0.12s", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 14 }}>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>
          <div style={{ padding: "16px 16px 0", borderTop: "1px solid #1A1C24" }}>
            <div style={{ fontSize: 10, color: "#3F3F46", fontWeight: 600, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 8 }}>Arsenal Value</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: "#6366F1", letterSpacing: -0.5 }}>~£{ownedTotal.toLocaleString()}</div>
            <div style={{ fontSize: 11, color: "#3F3F46", marginTop: 2 }}>{gear.flatMap(g => g.items).length} devices tracked</div>
          </div>
        </div>

        {/* Mobile nav */}
        <div className="mobile-nav" style={{ display: "none", position: "fixed", bottom: 0, left: 0, right: 0, background: "#0E1015", borderTop: "1px solid #1A1C24", zIndex: 100, justifyContent: "space-around", padding: "8px 0" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ background: "none", border: "none", color: activeTab === t.id ? "#6366F1" : "#52525B", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 12px" }}>
              <span style={{ fontSize: 18 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: activeTab === t.id ? 600 : 400 }}>{t.label}</span>
            </button>
          ))}
        </div>

        {/* Main */}
        <div className="main-content" style={{ flex: 1, padding: "32px 36px", overflowY: "auto", paddingBottom: 80 }}>
          <div style={{ maxWidth: 820, margin: "0 auto" }}>
            <div style={{ marginBottom: 28 }}>
              <h1 style={{ fontSize: 22, fontWeight: 700, color: "#F4F4F5", letterSpacing: -0.5, marginBottom: 4 }}>{meta.title}</h1>
              <div style={{ fontSize: 13, color: "#52525B" }}>{meta.desc}</div>
            </div>
            {activeTab === "arsenal" && <ArsenalTab />}
            {activeTab === "wishlist" && <WishlistTab />}
            {activeTab === "wiki" && <WikiTab />}
            {activeTab === "builds" && <BuildLogTab />}
            {activeTab === "shortcuts" && <ShortcutsTab />}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
